name: platform_mobile
description: Multi-category service marketplace mobile app

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Navigation
  go_router: ^14.2.0

  # Network
  dio: ^5.4.3+1
  retrofit: ^4.1.0
  json_annotation: ^4.9.0

  # Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.0
  intl: ^0.19.0

  # Forms & Validation
  formz: ^0.7.0

  # Location
  geolocator: ^12.0.0
  geocoding: ^3.0.0

  # Image
  image_picker: ^1.1.2
  image_cropper: ^7.0.5

  # Chat
  socket_io_client: ^3.0.1

  # Phone Auth
  pin_code_fields: ^8.0.1

  # Maps
  google_maps_flutter: ^2.6.1

  # Notifications
  firebase_messaging: ^15.0.2
  firebase_core: ^3.1.0
  flutter_local_notifications: ^17.2.1+2

  # Permissions
  permission_handler: ^11.3.1

  # URL Launcher
  url_launcher: ^6.2.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  json_serializable: ^6.8.0
  retrofit_generator: ^8.1.0

flutter:
  uses-material-design: true

  # assets:
  #   - assets/images/
  #   - assets/icons/
  #   - assets/animations/

  # Fonts loaded dynamically via google_fonts package
