<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plan International – COSME Y4 AWP Activities Directory</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <div class="logo">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 100 100" role="img" aria-label="Plan International logo">
                    <circle cx="50" cy="50" r="48" fill="#ffffff"/>
                    <circle cx="50" cy="50" r="44" fill="none" stroke="#005EB8" stroke-width="3"/>
                    <!-- Dancing child figure -->
                    <circle cx="54" cy="22" r="6" fill="#005EB8"/>
                    <path d="M44 32 c-2 5-4 14-3 24 l1 8 c0 3-2 5-5 8 l-7 6 c-2 2-1 4 1 5 l2 1 c2 1 4 1 5-1 l9-8 c2-2 3-2 4 0 l6 11 c1 2 4 3 5 1 l2-1 c2-1 3-4 2-5 l-8-14 c-1-2-1-4 1-6 l11-12 c2-3 1-5-1-7 l-3-3 c-2-2-5-3-7-1 l-9 10 c-1 1-3 1-4 0 l0-10 c0-3-2-5-5-5 l-3 0 c-3 0-5 2-5 5 z" fill="#005EB8"/>
                    <!-- Text arc: PLAN INTERNATIONAL -->
                    <text font-size="6.5" font-weight="700" fill="#005EB8" font-family="Arial, sans-serif">
                        <textPath href="#logoArcTop" startOffset="50%" text-anchor="middle">PLAN</textPath>
                    </text>
                    <text font-size="5" font-weight="700" fill="#005EB8" font-family="Arial, sans-serif">
                        <textPath href="#logoArcBottom" startOffset="50%" text-anchor="middle">INTERNATIONAL</textPath>
                    </text>
                    <defs>
                        <path id="logoArcTop" d="M 12,50 A 38,38 0 0,1 88,50" fill="none"/>
                        <path id="logoArcBottom" d="M 14,58 A 40,40 0 0,0 86,58" fill="none"/>
                    </defs>
                </svg>
                <div>
                    <h1>COSME Y4 Detailed Activities</h1>
                    <span class="subtitle">Plan International &mdash; Annual Work Plan Directory & Tracker</span>
                </div>
            </div>
        </div>
        <div class="header-right">
            <button class="btn btn-sync" id="btnReload" title="Reload from Excel">
                Reload Excel
            </button>
            <button class="btn btn-primary" id="btnAddNew">
                Add Activity
            </button>
        </div>
    </header>

    <!-- Navigation Tabs (Thematic Areas) -->
    <nav class="theme-tabs" id="themeTabs">
        <button class="tab active" data-theme="">All Areas</button>
    </nav>

    <!-- Dashboard Stats -->
    <section class="stats-grid" id="statsGrid">
        <div class="stat-card">
            <div class="stat-icon blue"></div>
            <div class="stat-info">
                <span class="stat-value" id="statTotal">0</span>
                <span class="stat-label">Total Activities</span>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon grey"></div>
            <div class="stat-info">
                <span class="stat-value" id="statNotStarted">0</span>
                <span class="stat-label">Not Started</span>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon orange"></div>
            <div class="stat-info">
                <span class="stat-value" id="statInProgress">0</span>
                <span class="stat-label">In Progress</span>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon green"></div>
            <div class="stat-info">
                <span class="stat-value" id="statCompleted">0</span>
                <span class="stat-label">Completed</span>
            </div>
        </div>
    </section>

    <!-- Filters -->
    <section class="filters-bar">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search activities, strategies, resources...">
        </div>
        <select id="filterStrategy" class="filter-select">
            <option value="">All Strategies</option>
            <option value="A">Strategy A</option>
            <option value="B">Strategy B</option>
            <option value="C">Strategy C</option>
            <option value="D">Strategy D</option>
            <option value="E">Strategy E</option>
        </select>
        <select id="filterStatus" class="filter-select">
            <option value="">All Statuses</option>
            <option value="Not Started">Not Started</option>
            <option value="In Progress">In Progress</option>
            <option value="Completed">Completed</option>
            <option value="On Hold">On Hold</option>
        </select>
        <button class="btn btn-outline" id="btnExport">
            Export CSV
        </button>
    </section>

    <!-- Activities grouped by Strategy -->
    <section class="content-area" id="contentArea">
        <div class="loading-msg">Loading activities...</div>
    </section>

    <!-- Activity Form Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="activityModal">
            <div class="modal-header">
                <h2 id="modalTitle">Track Activity</h2>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <div class="modal-body">
                <form id="activityForm">
                    <input type="hidden" id="frmId">

                    <!-- Editable activity fields -->
                    <div class="form-section" id="newActivityFields" style="display:none">
                        <h3>Activity Information</h3>
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="frmThematic">Thematic Area <span class="required">*</span></label>
                                <select id="frmThematic" name="thematic_area">
                                    <option value="Seaweed">Seaweed</option>
                                    <option value="Forestry-Mangrove">Forestry-Mangrove</option>
                                    <option value="Forestry-Terretrial">Forestry-Terrestrial</option>
                                    <option value="EBA + GJJ">EBA + GJJ</option>
                                    <option value="VSLA-REGAG - Schools">VSLA-REGAG - Schools</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="frmSubTheme">Sub-theme</label>
                                <input type="text" id="frmSubTheme" name="sub_theme" placeholder="e.g., GRAPP, HHAP, VSLA">
                            </div>
                            <div class="form-group">
                                <label for="frmStrategyCode">Strategy Code <span class="required">*</span></label>
                                <select id="frmStrategyCode" name="strategy_code">
                                    <option value="A">A</option>
                                    <option value="B">B</option>
                                    <option value="C">C</option>
                                    <option value="D">D</option>
                                    <option value="E">E</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="frmStrategyDesc">Strategy Description</label>
                                <input type="text" id="frmStrategyDesc" name="strategy_description" placeholder="e.g., Training/capacity gaps">
                            </div>
                            <div class="form-group full-width">
                                <label for="frmActivityDesc">Activity Description <span class="required">*</span></label>
                                <textarea id="frmActivityDesc" name="activity_description" rows="3" placeholder="Describe the activity..."></textarea>
                            </div>
                            <div class="form-group full-width">
                                <label for="frmResources">Resources Required</label>
                                <textarea id="frmResources" name="resources_required" rows="2"></textarea>
                            </div>
                            <div class="form-group full-width">
                                <label for="frmTechNotes">Technical Notes</label>
                                <textarea id="frmTechNotes" name="technical_notes" rows="2"></textarea>
                            </div>
                        </div>
                    </div>

                    <!-- Tracking fields -->
                    <div class="form-section">
                        <h3>Tracking & Updates</h3>
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="frmStatus">Status</label>
                                <select id="frmStatus" name="status">
                                    <option value="Not Started">Not Started</option>
                                    <option value="In Progress">In Progress</option>
                                    <option value="Completed">Completed</option>
                                    <option value="On Hold">On Hold</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="frmResponsible">Responsible Person</label>
                                <input type="text" id="frmResponsible" name="responsible_person" placeholder="e.g., Benard Muiruri">
                            </div>
                            <div class="form-group">
                                <label for="frmTargetDate">Target Date</label>
                                <input type="date" id="frmTargetDate" name="target_date">
                            </div>
                            <div class="form-group">
                                <label for="frmCompletionDate">Completion Date</label>
                                <input type="date" id="frmCompletionDate" name="completion_date">
                            </div>
                            <div class="form-group full-width">
                                <label for="frmProgressNotes">Progress Notes</label>
                                <textarea id="frmProgressNotes" name="progress_notes" rows="4" placeholder="Update progress, issues encountered, next steps..."></textarea>
                            </div>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn btn-outline" id="btnCancel">Cancel</button>
                        <button type="submit" class="btn btn-primary">
                            Save
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- History Modal -->
    <div class="modal-overlay" id="historyOverlay">
        <div class="modal modal-sm" id="historyModal">
            <div class="modal-header">
                <h2>Update History</h2>
                <button class="modal-close" id="historyClose">&times;</button>
            </div>
            <div class="modal-body" id="historyBody"></div>
        </div>
    </div>

    <div class="toast" id="toast"></div>
    <script src="app.js"></script>
</body>
</html>
